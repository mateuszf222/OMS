# Mechanika HTTP współdzielona — paginacja/sortowanie (06 §10, API-PAGE-1).
# Fragment komponentów OpenAPI 3.1. Reguła SH-REF (06 §2).
openapi: 3.1.0
info:
  title: _shared/pagination
  version: "1.0.0"
paths: {}
components:
  parameters:
    Page:
      name: page
      in: query
      required: false
      schema: { type: integer, minimum: 0, default: 0 }
      description: Numer strony (0-based).
    Size:
      name: size
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      description: Rozmiar strony (max 100).
    Sort:
      name: sort
      in: query
      required: false
      schema: { type: string }
      description: "Sortowanie: pole,kierunek (np. createdAt,desc). Tylko pola jawnie dozwolone."
  schemas:
    PageMetadata:
      type: object
      description: Metadane strony w kopercie listy (06 §10).
      required: [number, size, totalElements, totalPages]
      additionalProperties: false
      properties:
        number: { type: integer, minimum: 0 }
        size: { type: integer, minimum: 1 }
        totalElements: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
